name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # DATABASE_URL is never connected to during a build — lib/prisma.ts
      # (unlike lib/stripe.ts) constructs its client eagerly at import time,
      # so this only needs to be a non-empty, valid-looking connection
      # string to satisfy that check. No real database or secrets required.
      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
